name: Daily Kronos Scan Pipeline

on:
  schedule:
    # 每天北京时间 15:30 运行。
    # 换算公式为：北京时间(UTC+8) - 8小时 = UTC时间。 
    # 15:30 - 8小时 = 07:30 UTC
    - cron: '30 7 * * 1-5'
  
  # 允许咱们在 Action 页面手动点击触发运行！便于测试
  workflow_dispatch:

jobs:
  run-quant-scan:
    runs-on: ubuntu-latest
    
    # 赋予提交写入代码块的权限，让它能把 JSON 传回你的仓库
    permissions:
      contents: write

    steps:
      - name: 1. Checkout Your Repository
        uses: actions/checkout@v4

      - name: 2. Clone Shiyu-coder Kronos Engine
        # 这步相当于帮你把 KRONOS 的模型自动下到了工作区里面
        run: |
          git clone https://github.com/shiyu-coder/Kronos.git ./Kronos

      - name: 3. Set up Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 4. Install Dependencies
        # 安装你脚本依赖的所有基础包和深度学习库
        run: |
          python -m pip install --upgrade pip
          pip install torch numpy pandas akshare transformers huggingface_hub

      - name: 5. Execute AI Model Processing
        # 运行我们写好的分析脚本！
        run: |
          python scan.py

      - name: 6. Commit output data to GitHub
        # 将分析生成的最新 latest_scan.json 提交存回你的仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add latest_scan.json
          # 如果文件有变化就 commit，防止没改变导致的 action 报错
          git commit -m "chore: Auto-update daily Kronos analytics data" || echo "No data changes to commit"
          git push